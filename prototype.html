<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debunk AI - Fact-Checker Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Phosphor Icons for UI elements -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        .highlight {
            background-color: #fef08a; /* tailwind yellow-200 */
            cursor: pointer;
            border-radius: 0.25rem;
            padding: 0.125rem 0.25rem;
            transition: all 0.2s;
        }
        .highlight:hover, .highlight.active {
            background-color: #fde047; /* tailwind yellow-300 */
            box-shadow: 0 0 0 2px #eab308; /* tailwind yellow-500 */
        }
        .highlight-resolved {
            background-color: #bbf7d0; /* tailwind green-200 */
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [foundErrors, setFoundErrors] = useState(2);
            const totalErrors = 5;
            const [selectedHighlight, setSelectedHighlight] = useState(1);
            const [annotation, setAnnotation] = useState("");
            const [errorType, setErrorType] = useState("Logical Error");
            const [resolved, setResolved] = useState([]);

            const handleSubmit = () => {
                if (!resolved.includes(selectedHighlight)) {
                    setResolved([...resolved, selectedHighlight]);
                    setFoundErrors(prev => Math.min(prev + 1, totalErrors));
                    setAnnotation("");
                }
                setSelectedHighlight(null);
            };

            return (
                <div className="flex flex-col h-full bg-slate-50 font-sans">
                    {/* Header: Progress Bar */}
                    <header className="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shadow-sm z-10">
                        <div className="flex items-center gap-3">
                            <i className="ph-fill ph-target text-indigo-600 text-3xl"></i>
                            <h1 className="text-xl font-bold text-slate-800">Debunk AI</h1>
                        </div>
                        
                        <div className="flex bg-white px-5 py-2 rounded-full border border-gray-200 shadow-sm items-center gap-4">
                            <span className="text-sm font-semibold text-gray-600">Task Progress</span>
                            <div className="flex gap-1.5 items-center">
                                <div className="text-sm font-medium text-slate-700">You've found <span className="text-indigo-600 font-bold text-lg">{foundErrors}/{totalErrors}</span> AI errors</div>
                                <div className="w-32 h-2.5 bg-gray-100 rounded-full ml-2 overflow-hidden border border-gray-200">
                                    <div 
                                        className="h-full bg-gradient-to-r from-indigo-500 to-purple-600 transition-all duration-500"
                                        style={{ width: `${(foundErrors / totalErrors) * 100}%` }}
                                    ></div>
                                </div>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-4 text-gray-500">
                            <i className="ph ph-user-circle text-2xl hover:text-indigo-600 cursor-pointer transition"></i>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex flex-1 overflow-hidden">
                        {/* Left Panel: Text Reading Area */}
                        <section className="flex-1 overflow-y-auto w-2/3 p-10 bg-white shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-0 relative">
                            <div className="max-w-3xl mx-auto">
                                <div className="mb-8">
                                    <h2 className="text-3xl font-bold text-gray-900 mb-3">A Brief History of Computer Science (AI-Generated)</h2>
                                    <p className="text-sm text-gray-500 flex items-center gap-1">
                                        <i className="ph ph-robot"></i> Generated by AI Assistant. Please review and debunk the flaws.
                                    </p>
                                </div>
                                <div className="space-y-6 text-lg leading-relaxed text-gray-700">
                                    <p>
                                        The development of computer science is a process full of innovation and breakthroughs. Early calculation tools can be traced back to the ancient abacus. However, modern computers in the true sense originated in the mid-20th century.
                                    </p>
                                    <p>
                                        During World War II, Alan Turing proposed the concept of the "Turing Machine" and successfully cracked the German Enigma machine. <span 
                                            className={`highlight ${selectedHighlight === 1 && !resolved.includes(1) ? 'active' : ''} ${resolved.includes(1) ? 'highlight-resolved' : ''}`}
                                            onClick={() => setSelectedHighlight(1)}
                                        >
                                            Subsequently in 1950, Turing invented the world's first personal smartphone, which greatly promoted the development of the mobile internet.
                                        </span> This feat completely changed the way humans communicate.
                                    </p>
                                    <p>
                                        Entering the 21st century, artificial intelligence experienced explosive growth. The breakthrough of deep learning technology relies on two factors: massive data and powerful computing capabilities. <span 
                                            className={`highlight ${selectedHighlight === 2 && !resolved.includes(2) ? 'active' : ''} ${resolved.includes(2) ? 'highlight-resolved' : ''}`}
                                            onClick={() => setSelectedHighlight(2)}
                                        >
                                            Because the serial computing power of GPUs (Graphics Processing Units) is much lower than CPUs, deep learning training relies completely on modern high-performance CPU clusters.
                                        </span> This makes complex systems like large language models possible.
                                    </p>
                                    <p>
                                        In conclusion, although modern computing architectures are increasingly complex, their underlying logic still relies on the foundations laid by Turing and von Neumann over half a century ago.
                                    </p>
                                </div>
                            </div>
                        </section>

                        {/* Right Panel: Annotation Box */}
                        <aside className="w-[450px] bg-slate-50 border-l border-gray-200 p-6 flex flex-col h-full overflow-y-auto">
                            {selectedHighlight && !resolved.includes(selectedHighlight) ? (
                                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col gap-5 animate-fade-in-up">
                                    <div className="flex justify-between items-center border-b border-gray-100 pb-3">
                                        <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2">
                                            <i className="ph ph-pencil-simple-line text-indigo-600"></i>
                                            Add Annotation
                                        </h3>
                                        <button onClick={() => setSelectedHighlight(null)} className="text-gray-400 hover:text-gray-600 transition">
                                            <i className="ph ph-x text-lg"></i>
                                        </button>
                                    </div>
                                    
                                    <div className="bg-yellow-50 text-yellow-800 text-sm p-4 rounded-lg border border-yellow-200 italic shadow-inner">
                                        "{selectedHighlight === 1 ? 'Subsequently in 1950, Turing invented the world\'s first personal smartphone, which greatly promoted the development of the mobile internet.' : 'Because the serial computing power of GPUs (Graphics Processing Units) is much lower than CPUs, deep learning training relies completely on modern high-performance CPU clusters.'}"
                                    </div>

                                    <div className="flex flex-col gap-2">
                                        <label className="text-sm font-semibold text-gray-700">Error Type</label>
                                        <div className="relative">
                                            <select 
                                                className="w-full appearance-none bg-gray-50 border border-gray-300 text-gray-700 rounded-lg py-3 px-4 pr-10 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm cursor-pointer hover:bg-gray-100"
                                                value={errorType}
                                                onChange={(e) => setErrorType(e.target.value)}
                                            >
                                                <option value="Logical Error">Logical Error</option>
                                                <option value="Factual Error">Factual Error</option>
                                                <option value="AI Hallucination">AI Hallucination</option>
                                            </select>
                                            <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                                <i className="ph-fill ph-caret-down text-lg"></i>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-2 flex-grow">
                                        <label className="text-sm font-semibold text-gray-700">Correction Reason</label>
                                        <textarea 
                                            placeholder="Please enter your correction reason or the factual knowledge..."
                                            className="w-full h-32 bg-gray-50 border border-gray-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 resize-none transition shadow-sm"
                                            value={annotation}
                                            onChange={(e) => setAnnotation(e.target.value)}
                                        ></textarea>
                                    </div>

                                    <button 
                                        onClick={handleSubmit}
                                        disabled={!annotation.trim()}
                                        className={`w-full py-3 rounded-lg font-bold text-white shadow-md transition-all flex items-center justify-center gap-2
                                            ${annotation.trim() ? 'bg-indigo-600 hover:bg-indigo-700 hover:shadow-lg' : 'bg-gray-300 cursor-not-allowed'}
                                        `}
                                    >
                                        <i className="ph ph-check-circle text-xl"></i>
                                        Submit Correction
                                    </button>
                                </div>
                            ) : resolved.includes(selectedHighlight) ? (
                                <div className="flex flex-col items-center justify-center h-full text-center text-gray-400 gap-3">
                                    <div className="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center text-green-500 mb-2">
                                        <i className="ph-fill ph-check-circle text-4xl"></i>
                                    </div>
                                    <p className="font-medium text-slate-700">Successfully debunked this error!</p>
                                    <p className="text-sm">+1 Point, Great job!</p>
                                </div>
                            ) : (
                                <div className="flex flex-col items-center justify-center h-full text-center text-gray-400 gap-3">
                                    <i className="ph ph-cursor-text text-5xl opacity-50"></i>
                                    <p className="font-medium text-slate-600">Select/click highlighted text on the left<br/>to start your "Debunk" task</p>
                                </div>
                            )}
                        </aside>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
